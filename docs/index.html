<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSVP Reader — Board Comparison</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a0a;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #fff;
    user-select: none;
    min-height: 100vh;
  }

  .page-header {
    text-align: center;
    padding: 28px 20px 4px;
  }
  .page-header h1 { font-size: 22px; font-weight: 700; color: #eee; letter-spacing: -0.02em; }
  .page-header p { font-size: 12px; color: #555; margin-top: 4px; }

  /* Section headers */
  .section-header {
    text-align: center;
    padding: 20px 20px 8px;
  }
  .section-header h2 { font-size: 15px; font-weight: 600; color: #888; letter-spacing: 0.05em; text-transform: uppercase; }

  /* Board row */
  .boards-row {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    gap: 32px;
    padding: 16px 24px 24px;
    flex-wrap: wrap;
  }

  /* Each board column */
  .board-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .board-label { text-align: center; max-width: 280px; }
  .board-label h3 { font-size: 12px; font-weight: 600; color: #ccc; }
  .board-label .specs { font-size: 9px; color: #555; margin-top: 2px; line-height: 1.6; }
  .board-label .tag {
    display: inline-block; background: #1a1a1a; border: 1px solid #2a2a2a;
    color: #888; padding: 0px 5px; border-radius: 8px; font-size: 8px; margin: 1px 1px;
  }
  .board-label .tag.amoled { border-color: #3a2a3a; color: #a080c0; }
  .board-label .price { font-size: 11px; color: #e84040; font-weight: 600; margin-top: 3px; }

  /* Device shell */
  .device {
    background: #000;
    position: relative;
    overflow: hidden;
    border: 1px solid #222;
    box-shadow: 0 0 20px rgba(0,0,0,0.5), 0 0 0 4px #141414, 0 0 0 5px #222;
    border-radius: 6px;
  }
  .device.amoled-device {
    box-shadow: 0 0 20px rgba(80,0,120,0.15), 0 0 0 4px #141414, 0 0 0 5px #2a1a2a;
  }

  /* Screen tabs */
  .screen-tabs { display: flex; gap: 3px; margin-top: 4px; }
  .screen-tab {
    background: #1a1a1a; border: 1px solid #2a2a2a; color: #555;
    font-size: 8px; padding: 2px 8px; border-radius: 8px; cursor: pointer; transition: all 0.12s;
  }
  .screen-tab:hover { color: #aaa; border-color: #444; }
  .screen-tab.active { background: #e84040; border-color: #e84040; color: #fff; }

  /* Screen layers */
  .scr { position: absolute; inset: 0; display: none; flex-direction: column; }
  .scr.active { display: flex; }

  /* ── Shared component styles ── */
  .pk-hdr { background: #1a1a1a; border-bottom: 1px solid #2a2a2a; }
  .pk-hdr h4 { font-weight: 600; color: #fff; letter-spacing: 0.02em; }
  .pk-hdr span { color: #666; }

  .bk-list { flex: 1; overflow-y: auto; }
  .bk-list::-webkit-scrollbar { width: 2px; }
  .bk-list::-webkit-scrollbar-thumb { background: #333; }

  .bk-item {
    display: flex; align-items: center; cursor: pointer;
    border-bottom: 1px solid #111; transition: background 0.12s;
  }
  .bk-item:hover { background: #0f0f0f; }
  .bk-item:active { background: #1a1a1a; }
  .bk-cvr {
    border-radius: 2px; flex-shrink: 0; display: flex;
    align-items: center; justify-content: center; font-weight: 900; letter-spacing: -0.5px;
  }
  .bk-meta { flex: 1; min-width: 0; }
  .bk-ttl { font-weight: 600; color: #eee; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bk-auth { color: #666; }
  .bk-inf { color: #444; }

  .pk-ftr { border-top: 1px solid #1a1a1a; background: #0a0a0a; color: #333; text-align: center; }

  /* Reader components */
  .r-top {
    background: #1a1a1a; border-bottom: 1px solid #222;
    display: flex; align-items: center; flex-shrink: 0;
  }
  .r-ttl { font-weight: 600; color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .r-ch { color: #555; }
  .r-btn-back { background: none; border: none; color: #666; cursor: pointer; padding: 2px; line-height: 1; }
  .r-btn-back:hover { color: #aaa; }
  .r-btn-ch {
    background: #222; border: 1px solid #333; color: #777; border-radius: 3px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .r-btn-ch:hover { background: #2a2a2a; color: #aaa; }

  .r-area {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; position: relative; background: #000;
  }
  .r-guide {
    position: absolute; left: 50%; top: 25%; bottom: 20%;
    width: 1px; background: #1a1a1a; transform: translateX(-0.5px);
  }
  .r-wd {
    display: flex; align-items: center; justify-content: center;
    width: 100%; position: relative;
  }
  .r-wl, .r-wo, .r-wr {
    font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
    white-space: pre; line-height: 1;
  }
  .r-wl { font-weight: 500; color: #fff; text-align: right; }
  .r-wo {
    font-weight: 700; color: #e84040; position: relative; flex-shrink: 0;
  }
  .r-wo::after {
    content: ''; position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%);
    width: 3px; height: 3px; background: #e84040; border-radius: 50%; opacity: 0.7;
  }
  .r-wr { font-weight: 500; color: #fff; text-align: left; }

  .r-cnt {
    position: absolute; left: 0; right: 0; text-align: center;
    color: #2a2a2a; font-variant-numeric: tabular-nums; letter-spacing: 0.05em;
  }

  .r-idle {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 3px; pointer-events: none;
  }
  .r-idle-ico { opacity: 0.15; }
  .r-idle-txt { color: #333; letter-spacing: 0.08em; }

  .r-bot {
    background: #1a1a1a; border-top: 1px solid #222;
    display: flex; flex-direction: column; flex-shrink: 0;
  }
  .r-prog-trk { flex: 1; height: 3px; background: #2a2a2a; border-radius: 2px; overflow: hidden; }
  .r-prog-fill { height: 100%; background: #e84040; border-radius: 2px; width: 0%; transition: width 0.15s linear; }
  .r-prog-pct { color: #555; font-variant-numeric: tabular-nums; text-align: right; }

  .r-btn-play {
    background: #e84040; border: none; border-radius: 50%; color: #fff;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background 0.12s, transform 0.08s;
  }
  .r-btn-play:hover { background: #f05050; }
  .r-btn-play:active { transform: scale(0.93); }

  .r-btn-wpm {
    background: #222; border: 1px solid #333; color: #aaa; border-radius: 3px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .r-btn-wpm:hover { background: #2a2a2a; color: #fff; }

  .r-wpm { font-weight: 600; color: #ccc; text-align: center; font-variant-numeric: tabular-nums; }
  .r-wpm-lbl { color: #444; letter-spacing: 0.06em; text-align: center; }
  .r-status { color: #444; letter-spacing: 0.06em; text-align: right; }
  .r-status.playing { color: #4a9; }

  @keyframes wf { 0% { opacity: 0.6; } 15% { opacity: 1; } 100% { opacity: 1; } }
  .wf { animation: wf 0.08s ease-out; }

  /* Keyboard hint */
  .kb-hint {
    text-align: center; padding: 8px 20px 20px; font-size: 9px; color: #333; line-height: 1.8;
  }
  .kb-hint kbd {
    display: inline-block; background: #1a1a1a; border: 1px solid #2a2a2a;
    color: #666; padding: 0px 5px; border-radius: 3px; font-family: inherit; font-size: 8px;
  }

  /* Comparison table */
  .comparison { max-width: 1100px; margin: 0 auto 40px; padding: 0 20px; }
  .comparison h2 { font-size: 15px; font-weight: 600; color: #888; margin-bottom: 10px; text-align: center; text-transform: uppercase; letter-spacing: 0.05em; }
  .comparison table { width: 100%; border-collapse: collapse; font-size: 10px; }
  .comparison th { background: #1a1a1a; color: #777; font-weight: 600; text-align: left; padding: 6px 8px; border-bottom: 1px solid #2a2a2a; white-space: nowrap; }
  .comparison td { padding: 5px 8px; border-bottom: 1px solid #151515; color: #999; white-space: nowrap; }
  .comparison tr:hover td { background: #0d0d0d; }
  .comparison .y { color: #4a9; }
  .comparison .n { color: #e84040; }
  .comparison .hl { color: #e8e040; font-weight: 600; }
</style>
</head>
<body>

<div class="page-header">

<script>

    price:'~$28', note:'Tall 2\u2033 AMOLED', imu:true, rtc:true, tf:true, touch:true, audio:true, mic:true, btn:'BOOT', reuse:'~90%' },
  { id:'amoled-1_75', name:'ESP32-S3-Touch-AMOLED-1.75', w:466, h:466, type:'amoled',

  { id:'amoled-2_16', name:'ESP32-S3-Touch-AMOLED-2.16', w:480, h:480, type:'amoled',
    driver:'CO5300 QSPI', tags:['QMI8658','PCF85063','TF','Touch','Audio','Mic'],

  { id:'amoled-2_41', name:'ESP32-S3-Touch-AMOLED-2.41', w:600, h:450, type:'amoled',
    driver:'RM690B0 QSPI', tags:['QMI8658','PCF85063','TF','Touch'],
    price:'~$30', note:'Largest, landscape', imu:true, rtc:true, tf:true, touch:true, audio:false, mic:false, btn:'BOOT', reuse:'~80%' },

/* ════════════════════════════════════════════════════════════
   BOOK DATA
════════════════════════════════════════════════════════════ */
const BOOKS = [

    cc:'#1a0a0a', ct:'TTC', ctc:'#c0392b',
    chapters:[
      { t:'I \u2014 The Period', tx:'It was the best of times, it was the worst of times, it was the age of wisdom, it was the age of foolishness, it was the epoch of belief, it was the epoch of incredulity, it was the season of Light, it was the season of Darkness, it was the spring of hope, it was the winter of despair, we had everything before us, we had nothing before us, we were all going direct to Heaven, we were all going direct the other way.' },
      { t:'II \u2014 The Mail', tx:'There was a king with a large jaw and a queen with a plain face, on the throne of England; there was a king with a large jaw and a queen with a fair face, on the throne of France. In both countries it was clearer than crystal to the lords of the State preserves of loaves and fishes, that things in general were settled for ever.' },
      { t:'III \u2014 Night Shadows', tx:'It was the year of Our Lord one thousand seven hundred and seventy-five. Spiritual revelations were conceded to England at that favoured period, as at this. Mrs. Southcott had recently attained her five-and-twentieth blessed birthday, of whom a prophetic private in the Life Guards had heralded the sublime appearance.' }
    ] },
  { title:'Moby-Dick', author:'Herman Melville', year:'1851',
    cc:'#0a0d1a', ct:'MD', ctc:'#2980b9',
    chapters:[
      { t:'I \u2014 Loomings', tx:'Call me Ishmael. Some years ago never mind how long precisely having little money in my purse, and nothing particular to interest me on shore, I thought I would sail about a little and see the watery part of the world. It is a way I have of driving off the spleen and regulating the circulation.' },
      { t:'II \u2014 Carpet-Bag', tx:'I stuffed a shirt or two into my old carpet-bag, tucked it under my arm, and started for Cape Horn and the Pacific. Quitting the good city of old Manhatto, I duly arrived in New Bedford.' },

      { t:'Chapter I', tx:'It is a truth universally acknowledged, that a single man in possession of a good fortune, must be in want of a wife. However little known the feelings or views of such a man may be on his first entering a neighbourhood, this truth is so well fixed in the minds of the surrounding families.' },

      { t:'Chapter III', tx:'Not all that Mrs. Bennet, however, with the assistance of her five daughters, could ask on the subject was sufficient to draw from her husband any satisfactory description of Mr. Bingley.' }

      { t:'Chapter I', tx:'I am by birth a Genevese; and my family is one of the most distinguished of that republic. My ancestors had been for many years counsellors and syndics.' }

/* ════════════════════════════════════════════════════════════
   ORP + TIMING
════════════════════════════════════════════════════════════ */
function orpIdx(w) {
  const l = w.replace(/[^a-zA-Z0-9]/g,'').length || w.length;
  if(l<=1) return 0; if(l<=5) return 1; if(l<=9) return 2; if(l<=13) return 3; return 4;
}
function wordDelay(w, wpm) {
  let b = 60000/wpm;
  const c = w[w.length-1];
  if('.!?'.includes(c)) b*=2; else if(',;'.includes(c)) b*=1.5;
  const l = w.replace(/[^a-zA-Z0-9]/g,'').length || w.length;
  if(l>10) b*=1.25; else if(l<=3) b*=0.75;
  return b;
}

/* ════════════════════════════════════════════════════════════
   SIZING — compute proportional sizes from board dimensions
════════════════════════════════════════════════════════════ */
function sz(board) {
  const W = board.w, H = board.h;
  const s = Math.min(W, H) / 240; // scale factor relative to 240px baseline
  const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
  return {
    // picker
    pkPad: Math.round(clamp(s*10, 6, 16)),
    pkH1: Math.round(clamp(s*13, 9, 18)),
    pkSub: Math.round(clamp(s*8, 6, 11)),
    bkGap: Math.round(clamp(s*8, 4, 14)),
    bkPad: Math.round(clamp(s*10, 5, 14)),
    bkCvrW: Math.round(clamp(s*28, 16, 44)),
    bkCvrH: Math.round(clamp(s*38, 22, 60)),
    bkCvrFs: Math.round(clamp(s*10, 7, 18)),
    bkTtlFs: Math.round(clamp(s*10, 8, 14)),
    bkAuthFs: Math.round(clamp(s*8, 6, 11)),
    bkInfFs: Math.round(clamp(s*7, 5, 10)),
    ftrPad: Math.round(clamp(s*5, 3, 10)),
    ftrFs: Math.round(clamp(s*7, 5, 10)),
    // reader
    topH: Math.round(clamp(H*0.045, 20, 42)),
    topPad: Math.round(clamp(s*8, 4, 12)),
    ttlFs: Math.round(clamp(s*9, 7, 13)),
    chFs: Math.round(clamp(s*7, 5, 10)),
    backFs: Math.round(clamp(s*12, 8, 16)),
    chBtnSz: Math.round(clamp(s*18, 12, 26)),
    chBtnFs: Math.round(clamp(s*9, 6, 12)),
    wordFs: Math.round(clamp(Math.min(W*0.1, s*22), 12, 36)),
    wordH: Math.round(clamp(Math.min(W*0.14, s*30), 20, 60)),
    cntFs: Math.round(clamp(s*7, 5, 10)),
    cntTop: Math.round(clamp(s*10, 4, 20)),
    botH: Math.round(clamp(H*0.075, 36, 80)),
    botPad: Math.round(clamp(s*6, 3, 10)),
    playW: Math.round(clamp(s*24, 16, 36)),
    playFs: Math.round(clamp(s*10, 7, 14)),
    wpmFs: Math.round(clamp(s*10, 7, 14)),
    wpmW: Math.round(clamp(s*30, 20, 50)),
    wpmLblFs: Math.round(clamp(s*7, 5, 9)),
    wpmBtnSz: Math.round(clamp(s*18, 12, 28)),
    wpmBtnFs: Math.round(clamp(s*10, 7, 14)),
    statFs: Math.round(clamp(s*7, 5, 9)),
    progPctFs: Math.round(clamp(s*7, 5, 10)),
    idleIco: Math.round(clamp(s*18, 12, 32)),
    idleTxt: Math.round(clamp(s*7, 5, 11)),
  };
}

/* ════════════════════════════════════════════════════════════
   HTML GENERATION
════════════════════════════════════════════════════════════ */
function buildBoardHTML(board) {
  const S = sz(board);
  const isAM = board.type === 'amoled';
  const tagCls = isAM ? 'tag amoled' : 'tag';

  // Picker book items
  let booksHTML = '';
  BOOKS.forEach((bk, i) => {
    booksHTML += `<div class="bk-item" data-bidx="${i}" style="gap:${S.bkGap}px;padding:${S.bkPad}px">
      <div class="bk-cvr" style="width:${S.bkCvrW}px;height:${S.bkCvrH}px;font-size:${S.bkCvrFs}px;background:${bk.cc};color:${bk.ctc}">${bk.ct}</div>
      <div class="bk-meta">
        <div class="bk-ttl" style="font-size:${S.bkTtlFs}px">${bk.title}</div>
        <div class="bk-auth" style="font-size:${S.bkAuthFs}px">${bk.author}</div>
        <div class="bk-inf" style="font-size:${S.bkInfFs}px">${bk.year} &middot; ${bk.chapters.length} ch</div>
      </div>
    </div>`;
  });

  return `
  <div class="board-col">
    <div class="board-label">
      <h3>${board.name}</h3>
      <div class="specs">
        ${board.w} &times; ${board.h} &middot; ${board.driver}
        <br>${board.tags.map(t => `<span class="${tagCls}">${t}</span>`).join('')}
      </div>
      <div class="price">${board.price} &middot; ${board.note}</div>
    </div>
    <div class="device ${isAM ? 'amoled-device' : ''}" id="dev-${board.id}" style="width:${board.w}px;height:${board.h}px">
      <!-- PICKER SCREEN -->
      <div class="scr active" data-scr="picker">
        <div class="pk-hdr" style="padding:${S.pkPad}px">
          <h4 style="font-size:${S.pkH1}px">Library</h4>
          <span style="font-size:${S.pkSub}px">4 books</span>
        </div>
        <div class="bk-list">${booksHTML}</div>

/* ════════════════════════════════════════════════════════════
   BOARD CONTROLLER CLASS
════════════════════════════════════════════════════════════ */
class Board {
  constructor(id) {
    this.root = document.getElementById('dev-' + id);
    this.id = id;
    this.st = { bookIdx:0, chapIdx:0, words:[], wordIdx:0, wpm:300, timer:null, playing:false };

    // Cache DOM by data-v attributes (scoped to this device)
    this.v = {};
    this.root.querySelectorAll('[data-v]').forEach(el => { this.v[el.dataset.v] = el; });

    // Screens
    this.scrEls = {};
    this.root.querySelectorAll('[data-scr]').forEach(el => { this.scrEls[el.dataset.scr] = el; });

    // Wire actions
    this.root.addEventListener('click', e => {
      const act = e.target.closest('[data-act]');
      if (act) this.onAct(act.dataset.act);
      const bk = e.target.closest('[data-bidx]');
      if (bk) this.openBook(parseInt(bk.dataset.bidx));
    });

    // Build tabs
    const tabHost = document.querySelector(`[data-tabs-for="${id}"]`);
    if (tabHost) {
      ['picker','reader'].forEach(name => {
        const t = document.createElement('div');
        t.className = 'screen-tab' + (name === 'picker' ? ' active' : '');
        t.textContent = name === 'picker' ? 'Library' : 'Reader';
        t.addEventListener('click', () => this.showScr(name));
        tabHost.appendChild(t);
      });
    }
  }

  showScr(name) {
    Object.entries(this.scrEls).forEach(([k, el]) => el.classList.toggle('active', k === name));
    const tabHost = document.querySelector(`[data-tabs-for="${this.id}"]`);
    if (tabHost) {
      tabHost.querySelectorAll('.screen-tab').forEach((t, i) => {
        t.classList.toggle('active', (i === 0 && name === 'picker') || (i === 1 && name === 'reader'));
      });
    }
    this._scr = name;
  }

  openBook(idx) {
    this.stop();
    this.st.bookIdx = idx;
    this.st.chapIdx = 0;
    this.loadChap();
    this.showScr('reader');
  }

  loadChap() {
    const bk = BOOKS[this.st.bookIdx];
    const ch = bk.chapters[this.st.chapIdx];
    this.st.words = ch.tx.trim().split(/\s+/);
    this.st.wordIdx = 0;
    this.st.playing = false;
    this.v.title.textContent = bk.title;
    const label = ch.t.length > 16 ? ch.t.slice(0,16)+'\u2026' : ch.t;
    this.v.chapter.textContent = label + ' \u00b7 ' + (this.st.chapIdx+1) + '/' + bk.chapters.length;
    this.updProg();
    this.v.idle.style.display = 'flex';
    this.v.wl.textContent = '';
    this.v.wo.textContent = '\u00a0';
    this.v.wr.textContent = '';
    this.root.querySelector('.r-btn-play').innerHTML = '&#9654;';
    this.v.status.textContent = 'PAUSED';
    this.v.status.className = 'r-status';
  }

  updProg() {
    const t = this.st.words.length, i = this.st.wordIdx;
    const pct = t > 0 ? Math.round((i/t)*100) : 0;
    this.v.progfill.style.width = pct+'%';
    this.v.progpct.textContent = pct+'%';
    this.v.counter.textContent = t > 0 ? (i+1)+'/'+t : '\u2014';
  }

  showWord(w) {
    const o = orpIdx(w);
    this.v.wl.textContent = w.slice(0, o);
    this.v.wo.textContent = w[o] || '\u00a0';
    this.v.wr.textContent = w.slice(o+1);
    [this.v.wl, this.v.wo, this.v.wr].forEach(e => { e.classList.remove('wf'); void e.offsetWidth; e.classList.add('wf'); });
  }

  tick() {
    if (!this.st.playing) return;
    if (this.st.wordIdx >= this.st.words.length) {
      this.stop(); this.v.status.textContent = 'DONE'; this.v.status.className = 'r-status'; return;
    }
    const w = this.st.words[this.st.wordIdx];
    this.showWord(w);
    this.v.idle.style.display = 'none';
    this.updProg();
    this.st.wordIdx++;
    this.st.timer = setTimeout(() => this.tick(), wordDelay(w, this.st.wpm));
  }

  play() {
    if (this.st.playing) return;
    if (this.st.wordIdx >= this.st.words.length) this.st.wordIdx = 0;
    this.st.playing = true;
    this.root.querySelector('.r-btn-play').innerHTML = '&#9646;&#9646;';
    this.v.status.textContent = 'PLAYING';
    this.v.status.className = 'r-status playing';
    this.tick();
  }

  pause() {
    this.st.playing = false;
    clearTimeout(this.st.timer);
    this.root.querySelector('.r-btn-play').innerHTML = '&#9654;';
    this.v.status.textContent = 'PAUSED';
    this.v.status.className = 'r-status';
  }

  stop() {
    this.st.playing = false;
    clearTimeout(this.st.timer);
    this.root.querySelector('.r-btn-play').innerHTML = '&#9654;';
    this.v.status.textContent = 'PAUSED';
    this.v.status.className = 'r-status';
  }

  toggle() { this.st.playing ? this.pause() : this.play(); }

  setWpm(val) {
    this.st.wpm = Math.max(100, Math.min(1000, val));
    this.v.wpm.textContent = this.st.wpm;
  }

  onAct(a) {
    const bk = BOOKS[this.st.bookIdx];
    switch(a) {
      case 'play': this.toggle(); break;
      case 'wpm-down': this.setWpm(this.st.wpm-25); break;
      case 'wpm-up': this.setWpm(this.st.wpm+25); break;
      case 'prev-ch':
        if(this.st.chapIdx>0){this.stop();this.st.chapIdx--;this.loadChap();} break;
      case 'next-ch':
        if(this.st.chapIdx<bk.chapters.length-1){this.stop();this.st.chapIdx++;this.loadChap();} break;
      case 'back': this.stop(); this.showScr('picker'); break;
    }
  }
}

/* ════════════════════════════════════════════════════════════
   RENDER ALL BOARDS
════════════════════════════════════════════════════════════ */
const lcdRow = document.getElementById('lcd-row');
const amoledRow = document.getElementById('amoled-row');

BOARD_DEFS.forEach(bd => {
  const row = bd.type === 'lcd' ? lcdRow : amoledRow;
  row.insertAdjacentHTML('beforeend', buildBoardHTML(bd));
});

// Instantiate controllers
const boards = BOARD_DEFS.map(bd => new Board(bd.id));

// Keyboard targeting
let activeBoard = null;
boards.forEach(b => {
  b.root.addEventListener('click', () => { activeBoard = b; });
});
document.addEventListener('keydown', e => {
  if (!activeBoard || activeBoard._scr === 'picker') return;
  switch(e.key) {
    case ' ': e.preventDefault(); activeBoard.toggle(); break;
    case 'ArrowLeft': e.preventDefault(); activeBoard.setWpm(activeBoard.st.wpm-25); break;
    case 'ArrowRight': e.preventDefault(); activeBoard.setWpm(activeBoard.st.wpm+25); break;
    case 'ArrowUp': e.preventDefault(); activeBoard.onAct('prev-ch'); break;
    case 'ArrowDown': e.preventDefault(); activeBoard.onAct('next-ch'); break;
  }
});
